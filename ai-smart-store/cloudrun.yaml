apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-smart-store
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '5'
        autoscaling.knative.dev/minScale: '0'
    spec:
      containerConcurrency: 80
      containers:
      - image: ai-smart-store-image # This will be replaced by the actual image URI during deployment
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
        env:
        - name: GEMINI_API_KEY
          value: "AIzaSyBxUY7dqJpeV-RZtWsfHMsYOK-HGUVVc5k"
